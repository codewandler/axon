<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 240" width="800" height="240">

  <defs>
    <!-- ── Filters ─────────────────────────────────────────── -->
    <filter id="f-glow-xl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"  result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-glow-md" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-glow-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-text" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Gradients ──────────────────────────────────────── -->
    <radialGradient id="g-soma" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#9ef0ff"/>
      <stop offset="45%"  stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#003d66"/>
    </radialGradient>

    <linearGradient id="g-axon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#005f88"/>
      <stop offset="100%" stop-color="#00b8e0"/>
    </linearGradient>

    <linearGradient id="g-myelin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#003d5c"/>
      <stop offset="50%"  stop-color="#006b9a"/>
      <stop offset="100%" stop-color="#003d5c"/>
    </linearGradient>

    <radialGradient id="g-pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#aaf5ff" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#00c8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0099cc"  stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="g-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7be8ff"/>
      <stop offset="60%"  stop-color="#00aadd"/>
      <stop offset="100%" stop-color="#0077bb"/>
    </linearGradient>

    <!-- pulse motion path: soma → terminal branch point -->
    <path id="axon-path"
          d="M 112,130 L 222,130 L 278,130 L 334,130 L 390,130 L 445,130 L 495,130"
          fill="none"/>
  </defs>

  <!-- ══════════════════════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════════════════════ -->
  <rect width="800" height="240" rx="16" fill="#070d1a"/>

  <!-- subtle radial spotlight behind the neuron -->
  <radialGradient id="g-bg-spot" cx="38%" cy="55%" r="45%">
    <stop offset="0%"   stop-color="#001830" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#070d1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="240" rx="16" fill="url(#g-bg-spot)"/>

  <!-- decorative graph nodes (top-right, very dim) -->
  <g opacity="0.13" stroke="#1a5070" fill="#1a5070">
    <line x1="692" y1="38"  x2="728" y2="22"  stroke-width="1"/>
    <line x1="728" y1="22"  x2="762" y2="44"  stroke-width="1"/>
    <line x1="692" y1="38"  x2="712" y2="68"  stroke-width="1"/>
    <line x1="712" y1="68"  x2="748" y2="78"  stroke-width="1"/>
    <line x1="762" y1="44"  x2="748" y2="78"  stroke-width="1"/>
    <line x1="728" y1="22"  x2="712" y2="68"  stroke-width="1"/>
    <circle cx="692" cy="38"  r="3.5"/>
    <circle cx="728" cy="22"  r="3"/>
    <circle cx="762" cy="44"  r="3.5"/>
    <circle cx="712" cy="68"  r="2.5"/>
    <circle cx="748" cy="78"  r="3.5"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       DENDRITES
  ═══════════════════════════════════════════════════════ -->
  <g stroke="#005580" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85">
    <!-- upper tree -->
    <line x1="84"  y1="118" x2="54"  y2="86"/>
    <line x1="54"  y1="86"  x2="26"  y2="70"/>
    <line x1="54"  y1="86"  x2="32"  y2="108"/>
    <!-- mid upper -->
    <line x1="84"  y1="126" x2="46"  y2="118"/>
    <line x1="46"  y1="118" x2="18"  y2="112"/>
    <!-- lower tree -->
    <line x1="84"  y1="142" x2="54"  y2="166"/>
    <line x1="54"  y1="166" x2="26"  y2="178"/>
    <line x1="54"  y1="166" x2="32"  y2="190"/>
    <!-- mid lower -->
    <line x1="84"  y1="134" x2="52"  y2="148"/>
    <line x1="52"  y1="148" x2="24"  y2="156"/>
  </g>
  <!-- dendrite tips -->
  <g fill="#0088bb" filter="url(#f-glow-sm)">
    <circle cx="26"  cy="70"  r="3.5"/>
    <circle cx="32"  cy="108" r="2.5"/>
    <circle cx="18"  cy="112" r="3"/>
    <circle cx="26"  cy="178" r="3.5"/>
    <circle cx="32"  cy="190" r="2.5"/>
    <circle cx="24"  cy="156" r="3"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       SOMA (cell body)
  ═══════════════════════════════════════════════════════ -->
  <!-- outer pulse ring (firing indicator) -->
  <circle cx="112" cy="130" r="32" fill="none" stroke="#00ccee" stroke-width="1.5">
    <animate attributeName="r"            values="32;60;32"   dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"      values="0.65;0;0.65" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;0.2;2"    dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- second softer ring offset half-period -->
  <circle cx="112" cy="130" r="32" fill="none" stroke="#0099aa" stroke-width="1">
    <animate attributeName="r"       values="32;52;32"    dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- soma body -->
  <circle cx="112" cy="130" r="32" fill="url(#g-soma)" filter="url(#f-glow-sm)"/>
  <circle cx="112" cy="130" r="32" fill="none" stroke="#00aacc" stroke-width="1" opacity="0.6"/>
  <!-- nucleus -->
  <circle cx="112" cy="130" r="13" fill="#001e3a" opacity="0.9"/>
  <circle cx="112" cy="130" r="13" fill="none" stroke="#005f88" stroke-width="1"/>
  <!-- nucleolus dot -->
  <circle cx="108" cy="127" r="4"  fill="#0055a0" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════════════
       AXON HILLOCK + CORE
  ═══════════════════════════════════════════════════════ -->
  <!-- tapered hillock -->
  <path d="M 142,122 C 152,122 156,127 158,129 L 158,131 C 156,133 152,138 142,138 Z"
        fill="#005577" opacity="0.9"/>
  <!-- axon core line -->
  <line x1="158" y1="130" x2="495" y2="130" stroke="url(#g-axon)" stroke-width="5"/>

  <!-- ══════════════════════════════════════════════════════
       MYELIN SHEATHS
  ═══════════════════════════════════════════════════════ -->
  <g fill="url(#g-myelin)" opacity="0.88">
    <rect x="172" y="119" width="44" height="22" rx="11"/>
    <rect x="228" y="119" width="44" height="22" rx="11"/>
    <rect x="284" y="119" width="44" height="22" rx="11"/>
    <rect x="340" y="119" width="44" height="22" rx="11"/>
    <rect x="396" y="119" width="44" height="22" rx="11"/>
    <rect x="452" y="119" width="36" height="22" rx="11"/>
  </g>
  <!-- sheath border highlight -->
  <g fill="none" stroke="#0077aa" stroke-width="0.6" opacity="0.55">
    <rect x="172" y="119" width="44" height="22" rx="11"/>
    <rect x="228" y="119" width="44" height="22" rx="11"/>
    <rect x="284" y="119" width="44" height="22" rx="11"/>
    <rect x="340" y="119" width="44" height="22" rx="11"/>
    <rect x="396" y="119" width="44" height="22" rx="11"/>
    <rect x="452" y="119" width="36" height="22" rx="11"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       NODES OF RANVIER  (flash as pulse passes)
  ═══════════════════════════════════════════════════════ -->
  <!-- N1 at x=222, delay=0.34s -->
  <circle cx="222" cy="130" r="3.5" fill="#00aacc">
    <animate attributeName="r"       values="3.5;7;3.5"               keyTimes="0;0.12;1" dur="2.8s" begin="0.34s" repeatCount="indefinite"/>
    <animate attributeName="fill"    values="#00aacc;#ffffff;#00aacc"  keyTimes="0;0.12;1" dur="2.8s" begin="0.34s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"               keyTimes="0;0.12;1" dur="2.8s" begin="0.34s" repeatCount="indefinite"/>
  </circle>
  <!-- N2 at x=278, delay=0.64s -->
  <circle cx="278" cy="130" r="3.5" fill="#00aacc">
    <animate attributeName="r"       values="3.5;7;3.5"               keyTimes="0;0.12;1" dur="2.8s" begin="0.64s" repeatCount="indefinite"/>
    <animate attributeName="fill"    values="#00aacc;#ffffff;#00aacc"  keyTimes="0;0.12;1" dur="2.8s" begin="0.64s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"               keyTimes="0;0.12;1" dur="2.8s" begin="0.64s" repeatCount="indefinite"/>
  </circle>
  <!-- N3 at x=334, delay=0.94s -->
  <circle cx="334" cy="130" r="3.5" fill="#00aacc">
    <animate attributeName="r"       values="3.5;7;3.5"               keyTimes="0;0.12;1" dur="2.8s" begin="0.94s" repeatCount="indefinite"/>
    <animate attributeName="fill"    values="#00aacc;#ffffff;#00aacc"  keyTimes="0;0.12;1" dur="2.8s" begin="0.94s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"               keyTimes="0;0.12;1" dur="2.8s" begin="0.94s" repeatCount="indefinite"/>
  </circle>
  <!-- N4 at x=390, delay=1.24s -->
  <circle cx="390" cy="130" r="3.5" fill="#00aacc">
    <animate attributeName="r"       values="3.5;7;3.5"               keyTimes="0;0.12;1" dur="2.8s" begin="1.24s" repeatCount="indefinite"/>
    <animate attributeName="fill"    values="#00aacc;#ffffff;#00aacc"  keyTimes="0;0.12;1" dur="2.8s" begin="1.24s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"               keyTimes="0;0.12;1" dur="2.8s" begin="1.24s" repeatCount="indefinite"/>
  </circle>
  <!-- N5 at x=445, delay=1.53s -->
  <circle cx="445" cy="130" r="3.5" fill="#00aacc">
    <animate attributeName="r"       values="3.5;7;3.5"               keyTimes="0;0.12;1" dur="2.8s" begin="1.53s" repeatCount="indefinite"/>
    <animate attributeName="fill"    values="#00aacc;#ffffff;#00aacc"  keyTimes="0;0.12;1" dur="2.8s" begin="1.53s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7"               keyTimes="0;0.12;1" dur="2.8s" begin="1.53s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════════════════
       AXON TERMINALS
  ═══════════════════════════════════════════════════════ -->
  <g stroke="#0088bb" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- upper branch -->
    <path d="M 495,130 C 507,130 511,120 518,112"/>
    <line x1="518" y1="112" x2="542" y2="100"/>
    <line x1="518" y1="112" x2="544" y2="117"/>
    <!-- middle branch -->
    <line x1="495" y1="130" x2="548" y2="130"/>
    <!-- lower branch -->
    <path d="M 495,130 C 507,130 511,140 518,148"/>
    <line x1="518" y1="148" x2="542" y2="160"/>
    <line x1="518" y1="148" x2="544" y2="143"/>
  </g>

  <!-- ══════════════════════════════════════════════════════
       SYNAPTIC BOUTONS  (burst when pulse arrives, delay=1.8s)
  ═══════════════════════════════════════════════════════ -->
  <g filter="url(#f-glow-sm)">
    <!-- upper pair -->
    <circle cx="542" cy="100" r="5.5" fill="#0099cc">
      <animate attributeName="r"       values="5.5;12;5.5"              keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
      <animate attributeName="fill"    values="#0099cc;#aaffff;#0099cc"  keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8"               keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
    </circle>
    <circle cx="544" cy="117" r="5" fill="#0099cc">
      <animate attributeName="r"       values="5;11;5"                  keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
      <animate attributeName="fill"    values="#0099cc;#aaffff;#0099cc"  keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8"               keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
    </circle>
    <!-- middle -->
    <circle cx="548" cy="130" r="6" fill="#0099cc">
      <animate attributeName="r"       values="6;13;6"                  keyTimes="0;0.1;1" dur="2.8s" begin="1.88s" repeatCount="indefinite"/>
      <animate attributeName="fill"    values="#0099cc;#ccffff;#0099cc"  keyTimes="0;0.1;1" dur="2.8s" begin="1.88s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8"               keyTimes="0;0.1;1" dur="2.8s" begin="1.88s" repeatCount="indefinite"/>
    </circle>
    <!-- lower pair -->
    <circle cx="542" cy="160" r="5.5" fill="#0099cc">
      <animate attributeName="r"       values="5.5;12;5.5"              keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
      <animate attributeName="fill"    values="#0099cc;#aaffff;#0099cc"  keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8"               keyTimes="0;0.1;1" dur="2.8s" begin="1.80s" repeatCount="indefinite"/>
    </circle>
    <circle cx="544" cy="143" r="5" fill="#0099cc">
      <animate attributeName="r"       values="5;11;5"                  keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
      <animate attributeName="fill"    values="#0099cc;#aaffff;#0099cc"  keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8"               keyTimes="0;0.1;1" dur="2.8s" begin="1.84s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ══════════════════════════════════════════════════════
       ACTION POTENTIAL PULSE
       Travel: soma → terminal (1.8s), then invisible (1.0s pause)
       keyPoints / keyTimes hold at end position while fading
  ═══════════════════════════════════════════════════════ -->
  <!-- outer halo -->
  <circle r="16" fill="url(#g-pulse)" filter="url(#f-glow-xl)">
    <animateMotion dur="2.8s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;1;1;1" keyTimes="0;0.643;0.75;1">
      <mpath xlink:href="#axon-path"/>
    </animateMotion>
    <animate attributeName="opacity"
      values="0;0.95;0.95;0.95;0.8;0.5;0"
      keyTimes="0;0.04;0.35;0.60;0.68;0.72;0.78"
      dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- bright inner core -->
  <circle r="5.5" fill="#ffffff" filter="url(#f-glow-md)">
    <animateMotion dur="2.8s" repeatCount="indefinite" calcMode="linear"
      keyPoints="0;1;1;1" keyTimes="0;0.643;0.75;1">
      <mpath xlink:href="#axon-path"/>
    </animateMotion>
    <animate attributeName="opacity"
      values="0;1;1;1;0.9;0.3;0"
      keyTimes="0;0.04;0.35;0.60;0.66;0.72;0.78"
      dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ══════════════════════════════════════════════════════
       TEXT
  ═══════════════════════════════════════════════════════ -->
  <!-- "axon" -->
  <text x="688" y="156"
        font-family="'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace"
        font-size="90" font-weight="700" letter-spacing="-3"
        fill="url(#g-text)" text-anchor="middle"
        filter="url(#f-text)">axon</text>

  <!-- tagline -->
  <text x="688" y="185"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="11.5" font-weight="400" letter-spacing="3.5"
        fill="#2d6e8a" text-anchor="middle">AI-NATIVE GRAPH DATABASE</text>

</svg>
