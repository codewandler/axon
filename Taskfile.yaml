# https://taskfile.dev
version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -X main.version={{.VERSION}}
  BIN: ./bin/axon
  BIN_TUI: ./bin/axonui

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the axon binary to ./bin/axon
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN}} ./cmd/axon
    sources:
      - "**/*.go"
    generates:
      - "{{.BIN}}"

  build:tui:
    desc: Build the axonui binary to ./bin/axonui
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_TUI}} ./cmd/axonui
    sources:
      - "**/*.go"
    generates:
      - "{{.BIN_TUI}}"

  build:all:
    desc: Build all binaries (axon + axonui)
    deps: [build, build:tui]

  install:
    desc: Install axon to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" ./cmd/axon

  install:tui:
    desc: Install axonui to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" ./cmd/axonui

  install:all:
    desc: Install all binaries (axon + axonui)
    deps: [install, install:tui]

  test:
    desc: Run all tests (no cache)
    cmds:
      - go test -count=1 ./...

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v -count=1 ./...

  test:race:
    desc: Run all tests with race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  clean:
    desc: Remove all built binaries
    cmds:
      - rm -f {{.BIN}} {{.BIN_TUI}}
